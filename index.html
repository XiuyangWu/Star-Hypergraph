<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星空超图 · Celestial Hypergraph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Noto+Serif+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <script crossorigin src="./libs/react.production.min.js"></script>
  <script crossorigin src="./libs/react-dom.production.min.js"></script>
  <script src="./libs/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #03020a; overflow-x: hidden; scroll-behavior: smooth; }
    body { font-family: 'Cormorant Garamond', 'Noto Serif SC', serif; color: #e8e3d3; }

    /* ================ 背景宇宙层 ================ */
    .cosmos-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(85, 50, 150, 0.35), transparent 60%),
        radial-gradient(ellipse 50% 30% at 85% 75%, rgba(180, 60, 90, 0.20), transparent 55%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(40, 80, 180, 0.18), transparent 60%),
        linear-gradient(180deg, #050214 0%, #02010a 50%, #060218 100%);
    }
    .cosmos-bg::before {
      content: ''; position: absolute; inset: 0;
      background-image: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=2400&q=80&auto=format&fm=jpg');
      background-size: cover; background-position: center;
      opacity: 0.28; mix-blend-mode: screen;
      filter: contrast(1.1) saturate(1.2);
    }
    .cosmos-bg::after {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(circle at 20% 50%, rgba(0,0,0,0) 0%, rgba(3,2,10,0.4) 70%),
        radial-gradient(circle at 80% 50%, rgba(0,0,0,0) 0%, rgba(3,2,10,0.4) 70%);
    }
    .star-field { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .css-star {
      position: absolute; border-radius: 50%; background: white;
      animation: twinkle 4s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: var(--base-op, 0.5); }
      50% { opacity: 1; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.95); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    @keyframes scrollHint {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50%      { transform: translateY(8px); opacity: 1; }
    }
    @keyframes starPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.08); opacity: 0.85; }
    }

    .content-layer { position: relative; z-index: 2; }

    /* ================ Hero ================ */
    .hero {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 60px 20px; position: relative;
    }
    .hero-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 4px; color: #8b7f5f;
      text-transform: uppercase; margin-bottom: 32px;
      animation: fadeIn 1.2s ease 0.2s both;
    }
    .hero-tag .dot {
      display: inline-block; width: 4px; height: 4px;
      background: #fbbf24; border-radius: 50%; margin: 0 12px;
      vertical-align: middle;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 8vw, 110px);
      font-weight: 500; font-style: italic;
      letter-spacing: 1px; line-height: 1; margin-bottom: 8px;
      background: linear-gradient(110deg, #ffe5b8 0%, #ffffff 25%, #c4a8ff 50%, #ffffff 75%, #ffd9a8 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeInUp 1.4s ease 0.4s both, shimmer 8s ease infinite;
    }
    .hero-title-cn {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(28px, 4.5vw, 56px);
      font-weight: 400; color: #ffffff;
      letter-spacing: 12px; margin: 16px 0 32px;
      opacity: 0.92;
      animation: fadeInUp 1.4s ease 0.7s both;
    }
    .hero-poem {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(15px, 1.6vw, 19px);
      color: #b8b29c; line-height: 2.2;
      max-width: 620px; margin: 0 auto 48px;
      font-weight: 300; letter-spacing: 2px;
      animation: fadeIn 1.6s ease 1s both;
    }
    .hero-poem em { font-style: normal; color: #fde68a; }
    .hero-stats {
      display: flex; gap: 60px; margin-top: 24px;
      animation: fadeIn 1.4s ease 1.4s both;
      flex-wrap: wrap; justify-content: center;
    }
    .hero-stat { text-align: center; }
    .hero-stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px; font-weight: 600; color: #fde68a;
      font-variant-numeric: tabular-nums; line-height: 1;
    }
    .hero-stat-eq {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px; font-style: italic; color: #8b7f5f;
      margin-top: 4px; letter-spacing: 1px;
    }
    .hero-stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 2px; color: #6b6552;
      text-transform: uppercase; margin-top: 6px;
    }
    .scroll-hint {
      margin-top: 60px; font-size: 12px; color: #6b6552;
      letter-spacing: 3px; text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      animation: scrollHint 2s ease infinite, fadeIn 1s ease 2s both;
      cursor: pointer;
    }

    /* ================ Section header ================ */
    .section-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 4px; color: #8b7f5f;
      text-transform: uppercase;
      display: inline-flex; align-items: center; gap: 12px;
    }
    .section-tag::before {
      content: ''; width: 30px; height: 1px; background: #8b7f5f;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 5vw, 58px);
      font-weight: 500; font-style: italic;
      color: #ffffff; margin: 16px 0 10px; line-height: 1.05;
    }
    .section-title-cn {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(20px, 2.5vw, 28px);
      color: #b8b29c; font-weight: 300;
      letter-spacing: 6px; margin-bottom: 32px;
    }
    .section-intro {
      max-width: 760px; font-size: 16px; line-height: 2;
      color: #b8b29c; font-family: 'Noto Serif SC', serif; font-weight: 300;
    }
    .section-intro .gold { color: #fde68a; }
    .section-intro .blue { color: #BFE8FF; }
    .section-intro .highlight {
      color: #e8e3d3; font-weight: 500;
      background: linear-gradient(transparent 65%, rgba(253, 230, 138, 0.15) 65%);
      padding: 0 3px;
    }

    /* ================ Prologue Section（阿尔忒弥斯 2 号引入） ================ */
    .prologue {
      padding: 100px 40px 80px;
      max-width: 1380px; margin: 0 auto;
      position: relative;
    }
    .prologue-grid {
      display: grid; grid-template-columns: 1.1fr 1fr;
      gap: 64px; margin-top: 48px;
      align-items: center;
    }
    .prologue-img-wrap {
      position: relative;
      border-radius: 3px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .prologue-img {
      width: 100%; height: auto; display: block;
      filter: contrast(1.05) saturate(1.1);
    }
    .prologue-img-caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 16px 20px;
      background: linear-gradient(180deg, transparent, rgba(5,2,20,0.88));
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 2px; color: #b8b29c;
      line-height: 1.7;
    }
    .prologue-img-caption .cap-title {
      color: #fde68a; font-size: 11px; margin-bottom: 3px;
      font-weight: 500;
    }
    .prologue-text .quote {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 20px;
      color: #fde68a; line-height: 1.5;
      margin: 24px 0 8px;
      padding-left: 16px;
      border-left: 2px solid rgba(253,230,138,0.4);
    }
    .prologue-text .quote-src {
      font-family: 'Noto Serif SC', serif;
      font-size: 13px; color: #8b7f5f;
      padding-left: 16px; margin-bottom: 32px;
    }
    .prologue-text p {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px; line-height: 2; color: #c5bfa9;
      font-weight: 300; margin-bottom: 16px;
    }
    .prologue-text p strong {
      color: #fde68a; font-weight: 500;
    }
    .prologue-text p .cyan { color: #BFE8FF; font-style: italic; }
    .prologue-lead {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px !important; font-style: italic;
      color: #e8e3d3 !important; line-height: 1.6 !important;
      margin-bottom: 28px !important;
    }
    .prologue-orion-bridge {
      margin-top: 36px;
      padding: 22px 24px;
      background: linear-gradient(90deg, rgba(107,212,255,0.06) 0%, rgba(253,230,138,0.06) 100%);
      border-top: 1px solid rgba(253,230,138,0.25);
      border-bottom: 1px solid rgba(253,230,138,0.25);
      border-radius: 2px;
    }
    .prologue-orion-bridge .orion-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 3px;
      color: #fde68a; margin-bottom: 8px;
    }
    .prologue-orion-bridge .orion-text {
      font-family: 'Noto Serif SC', serif;
      font-size: 14.5px; line-height: 1.95;
      color: #d8d1bc; font-weight: 300;
    }
    .prologue-orion-bridge .orion-text em {
      color: #fde68a; font-style: italic; font-weight: 500;
    }

    /* ================ Primer Section（图→超图→星空） ================ */
    .primer {
      padding: 100px 40px 80px;
      max-width: 1380px; margin: 0 auto;
    }
    .primer-steps {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 24px; margin-top: 60px;
    }
    .primer-card {
      background: linear-gradient(170deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 3px; padding: 32px 28px 28px;
      position: relative; overflow: hidden;
      transition: all 0.4s;
    }
    .primer-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.18);
    }
    .primer-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--top-line, linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent));
    }
    .primer-step-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px; font-style: italic;
      color: #5b5440; letter-spacing: 3px;
      margin-bottom: 12px; text-transform: uppercase;
    }
    .primer-step-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px; font-weight: 600; font-style: italic;
      color: #fff; line-height: 1.1; margin-bottom: 4px;
    }
    .primer-step-cn {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px; color: #fde68a;
      letter-spacing: 2px; margin-bottom: 20px;
    }
    .primer-diagram {
      width: 100%; height: 180px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .primer-body {
      font-family: 'Noto Serif SC', serif;
      font-size: 14px; line-height: 1.95; color: #c5bfa9;
      font-weight: 300;
    }
    .primer-body strong {
      color: #fde68a; font-weight: 500;
    }
    .primer-callout {
      margin-top: 50px; padding: 30px 36px;
      background: linear-gradient(90deg, rgba(253,230,138,0.06) 0%, rgba(107,212,255,0.06) 100%);
      border-left: 2px solid #fde68a;
      border-radius: 2px;
    }
    .primer-callout-text {
      font-family: 'Noto Serif SC', serif;
      font-size: 17px; line-height: 2; color: #e8e3d3;
      font-weight: 300;
    }
    .primer-callout-text .accent { color: #fde68a; font-weight: 500; }

    /* ================ Identity Duel ================ */
    .identity-section {
      padding: 100px 40px;
      max-width: 1280px; margin: 0 auto;
    }
    .identity-grid {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 40px; align-items: center; margin-top: 60px;
    }
    .identity-card {
      background: linear-gradient(160deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2px; padding: 36px 32px;
      transition: all 0.4s;
    }
    .identity-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.18);
    }
    .identity-card.west {
      border-top: 2px solid #6BD4FF;
      box-shadow: 0 0 60px rgba(107, 212, 255, 0.05);
    }
    .identity-card.cn {
      border-top: 2px solid #FFB347;
      box-shadow: 0 0 60px rgba(255, 179, 71, 0.05);
    }
    .identity-card .card-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 14px;
    }
    .identity-card.west .card-tag { color: #6BD4FF; }
    .identity-card.cn .card-tag { color: #FFB347; }
    .identity-card .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px; font-weight: 600; font-style: italic;
      color: #fff; margin-bottom: 4px; line-height: 1.1;
    }
    .identity-card.cn .card-name {
      font-family: 'Noto Serif SC', serif; font-style: normal;
    }
    .identity-card .card-sub {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px; color: #b8b29c; margin-bottom: 20px;
    }
    .identity-card .card-myth {
      font-family: 'Noto Serif SC', serif;
      font-size: 14px; line-height: 2; color: #c5bfa9;
      font-weight: 300;
    }
    .identity-bridge {
      text-align: center; padding: 0 8px;
    }
    .identity-bridge .star-icon {
      width: 64px; height: 64px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      margin: 0 auto 16px;
      position: relative;
    }
    .identity-bridge .star-icon::before {
      content: ''; position: absolute; inset: -8px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50%; animation: pulse-ring 2.5s ease infinite;
    }
    .identity-bridge .star-icon::after {
      content: '✦'; color: #fde68a; font-size: 24px;
    }
    .identity-bridge .same-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 3px;
      color: #fde68a; text-transform: uppercase;
    }
    .identity-bridge .star-name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 20px; color: #fff;
      margin-top: 6px;
    }

    /* ================ Atlas ================ */
    .viz-section {
      padding: 80px 0 40px;
      max-width: 1580px; margin: 0 auto;
    }
    .viz-header {
      padding: 0 40px 40px;
      max-width: 1100px;
    }
    .viz-shell {
      margin: 0 32px;
      background: rgba(6, 4, 16, 0.75);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }
    .viz-grid {
      display: grid; grid-template-columns: 250px 1fr 340px;
      min-height: 720px;
    }

    .panel-side {
      padding: 26px 22px; overflow-y: auto;
      border-right: 1px solid rgba(255,255,255,0.05);
      max-height: 760px;
    }
    .panel-side.right {
      border-right: none;
      border-left: 1px solid rgba(255,255,255,0.05);
    }
    .panel-section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 3px;
      color: #8b7f5f; text-transform: uppercase;
      margin-bottom: 14px;
    }
    .mode-buttons { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 26px; }
    .btn {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      color: #c5bfa9;
      padding: 7px 13px;
      font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
      font-size: 14px; letter-spacing: 1px;
      cursor: pointer; transition: all 0.2s;
      border-radius: 2px;
    }
    .btn:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.2);
      color: #fff;
    }
    .btn.active {
      background: rgba(253, 230, 138, 0.1);
      border-color: rgba(253, 230, 138, 0.5);
      color: #fde68a;
    }
    .edge-list-section { margin-bottom: 22px; }
    .edge-list-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .edge-list-title.w { color: #6BD4FF; }
    .edge-list-title.c { color: #FFB347; }
    .edge-item {
      padding: 5px 8px; font-size: 14px; cursor: pointer;
      border-radius: 2px; transition: background 0.15s;
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .edge-item:hover { background: rgba(255,255,255,0.04); }
    .edge-item.locked.w { background: rgba(107, 212, 255, 0.12); }
    .edge-item.locked.c { background: rgba(255, 179, 71, 0.12); }
    .edge-item .name-w { color: #BFE8FF; font-style: italic; }
    .edge-item .name-c { color: #ffe2a8; font-family: 'Noto Serif SC', serif; }
    .edge-item .count {
      color: #5b5440; font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
    }
    .scroll-panel::-webkit-scrollbar { width: 4px; }
    .scroll-panel::-webkit-scrollbar-track { background: transparent; }
    .scroll-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* 图例 */
    .legend-section {
      margin-top: 20px; padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .legend-row {
      display: flex; align-items: center; gap: 10px;
      padding: 3px 2px; font-size: 12px; color: #a8a391;
      font-family: 'Noto Serif SC', serif;
    }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%;
      box-shadow: 0 0 8px currentColor;
    }

    .star-pt { animation: twinkle 3s ease-in-out infinite; }
    .edge-path { transition: opacity 0.4s, stroke-width 0.4s; cursor: pointer; }

    /* Detail panel */
    .detail-empty {
      color: #8f8876; font-size: 14px; line-height: 2; font-style: italic;
    }
    .detail-empty p { margin-bottom: 16px; }
    .detail-empty strong {
      color: #e8e3d3; font-style: normal; font-weight: 600;
    }
    .detail-empty .gold { color: #fde68a; }
    .detail-empty .blue { color: #BFE8FF; }
    .detail-tip {
      margin-top: 22px; padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: #8b7f5f;
      line-height: 2;
    }

    .detail-block { padding: 0 4px; }
    .detail-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 3px;
      color: #8b7f5f; text-transform: uppercase;
      margin-bottom: 6px;
    }
    .detail-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-style: italic; color: #fff;
      line-height: 1.1;
    }
    .detail-name-cn {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px; color: #fde68a; margin-top: 4px;
    }
    .detail-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: #8b7f5f; margin-top: 8px;
    }
    .edge-card {
      margin-top: 12px; padding: 12px 14px;
      border-left: 2px solid;
      border-radius: 2px;
    }
    .edge-card.w {
      background: rgba(107, 212, 255, 0.06);
      border-color: #6BD4FF;
    }
    .edge-card.c {
      background: rgba(255, 179, 71, 0.06);
      border-color: #FFB347;
    }
    .edge-card-name {
      font-size: 15px; margin-bottom: 4px;
    }
    .edge-card.w .edge-card-name {
      color: #BFE8FF; font-style: italic;
    }
    .edge-card.c .edge-card-name {
      color: #ffe2a8; font-family: 'Noto Serif SC', serif;
    }

    // ==================== 几何工具 ====================
    function convexHull(pts) {
      if (pts.length < 3) return pts.slice();
      const p = pts.slice().sort((a, b) => a.x - b.x || a.y - b.y);
      const cross = (O, A, B) => (A.x - O.x) * (B.y - O.y) - (A.y - O.y) * (B.x - O.x);
      const lower = [];
      for (const q of p) {
        while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], q) <= 0) lower.pop();
        lower.push(q);
      }
      const upper = [];
      for (let i = p.length - 1; i >= 0; i--) {
        const q = p[i];
        while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], q) <= 0) upper.pop();
        upper.push(q);
      }
      lower.pop(); upper.pop();
      return lower.concat(upper);
    }

    function hyperedgePath(stars, padding = 28) {
      if (stars.length === 0) return '';
      if (stars.length === 1) {
        const s = stars[0];
        return `M ${s.x - padding} ${s.y} a ${padding} ${padding} 0 1 0 ${padding*2} 0 a ${padding} ${padding} 0 1 0 ${-padding*2} 0 Z`;
      }
      if (stars.length === 2) {
        const [a, b] = stars;
        const dx = b.x - a.x, dy = b.y - a.y;
        const len = Math.sqrt(dx*dx + dy*dy) || 1;
        const nx = -dy / len * padding, ny = dx / len * padding;
        return `M ${a.x + nx} ${a.y + ny} L ${b.x + nx} ${b.y + ny} A ${padding} ${padding} 0 0 1 ${b.x - nx} ${b.y - ny} L ${a.x - nx} ${a.y - ny} A ${padding} ${padding} 0 0 1 ${a.x + nx} ${a.y + ny} Z`;
      }
      const hull = convexHull(stars);
      const cx = hull.reduce((s, p) => s + p.x, 0) / hull.length;
      const cy = hull.reduce((s, p) => s + p.y, 0) / hull.length;
      const expanded = hull.map(p => {
        const dx = p.x - cx, dy = p.y - cy;
        const len = Math.sqrt(dx*dx + dy*dy) || 1;
        return { x: p.x + dx/len*padding, y: p.y + dy/len*padding };
      });
      let d = `M ${expanded[0].x} ${expanded[0].y}`;
      for (let i = 0; i < expanded.length; i++) {
        const cur = expanded[i];
        const next = expanded[(i + 1) % expanded.length];
        const mx = (cur.x + next.x) / 2;
        const my = (cur.y + next.y) / 2;
        d += ` Q ${cur.x} ${cur.y} ${mx} ${my}`;
      }
      d += ' Z';
      return d;
    }

    function magToRadius(mag) { return Math.max(1.4, 5.0 - mag * 0.95); }

    // ==================== 真实恒星组件 ====================
    // 一颗带星芒+光晕+光谱色的美丽恒星
    function RealisticStar({ star, isActive, isDim, showSpike, onMouseEnter, onMouseLeave, onClick }) {
      const r = magToRadius(star.mag);
      const color = getColor(star.spec);
      const spikeLen = r * 4.5;
      const dimOp = isDim ? 0.3 : 1;
      const activeOp = isActive ? 1 : dimOp;

      return (
        <g style={{ cursor: 'pointer' }}
           onMouseEnter={onMouseEnter}
           onMouseLeave={onMouseLeave}
           onClick={onClick}>
          {/* 外层光晕 */}
          <circle cx={star.x} cy={star.y} r={r * 5.5}
                  fill={color} opacity={isActive ? 0.35 : dimOp * 0.18} filter="url(#star-glow)"
                  style={{ transition: 'opacity 0.3s' }} />
          {/* 十字星芒（水平+垂直） */}
          {showSpike && (
            <g opacity={activeOp * 0.75} style={{ transition: 'opacity 0.3s' }}>
              <line x1={star.x - spikeLen} y1={star.y} x2={star.x + spikeLen} y2={star.y}
                    stroke={color} strokeWidth="0.5" strokeLinecap="round" />
              <line x1={star.x} y1={star.y - spikeLen} x2={star.x} y2={star.y + spikeLen}
                    stroke={color} strokeWidth="0.5" strokeLinecap="round" />
              {/* 对角斜星芒，更小更细 */}
              <line x1={star.x - spikeLen*0.6} y1={star.y - spikeLen*0.6}
                    x2={star.x + spikeLen*0.6} y2={star.y + spikeLen*0.6}
                    stroke={color} strokeWidth="0.3" strokeLinecap="round" opacity="0.5" />
              <line x1={star.x - spikeLen*0.6} y1={star.y + spikeLen*0.6}
                    x2={star.x + spikeLen*0.6} y2={star.y - spikeLen*0.6}
                    stroke={color} strokeWidth="0.3" strokeLinecap="round" opacity="0.5" />
            </g>
          )}
          {/* 主体（光谱色） */}
          <circle cx={star.x} cy={star.y} r={r}
                  fill={color} opacity={activeOp}
                  className="star-pt"
                  style={{ animationDelay: `${(star.x + star.y) % 4}s`, transition: 'opacity 0.3s' }} />
          {/* 高亮核心 */}
          <circle cx={star.x} cy={star.y} r={r * 0.5}
                  fill="#ffffff" opacity={activeOp * 0.9} />
          {/* 活跃状态额外脉冲环 */}
          {isActive && (
            <circle cx={star.x} cy={star.y} r={r + 6}
                    fill="none" stroke="#ffffff" strokeWidth="0.8" opacity="0.6">
              <animate attributeName="r" from={r + 4} to={r + 14}
                       dur="1.6s" repeatCount="indefinite" />
              <animate attributeName="opacity" from="0.7" to="0"
                       dur="1.6s" repeatCount="indefinite" />
            </circle>
          )}
          {/* 透明大点便于悬停 */}
          <circle cx={star.x} cy={star.y} r={Math.max(r * 3, 14)} fill="transparent" />
        </g>
      );
    }

    // ==================== Atlas（核心可视化，重大升级） ====================
    function StarMap() {
      const [mode, setMode] = useState('both');
      const [hoveredStar, setHoveredStar] = useState(null);
      const [lockedStar, setLockedStar] = useState(null);
      const [hoveredEdge, setHoveredEdge] = useState(null);
      const [lockedEdge, setLockedEdge] = useState(null);

      const starById = useMemo(() => Object.fromEntries(STARS.map(s => [s.id, s])), []);
      const activeStar = lockedStar || hoveredStar;
      const activeEdge = lockedEdge || hoveredEdge;

      const edgesOfStar = (starId) => ({
        w: WESTERN.filter(e => e.stars.includes(starId)),
        c: CHINESE.filter(e => e.stars.includes(starId))
      });

      const visibleEdges = useMemo(() => {
        const list = [];
        if (mode === 'western' || mode === 'both') list.push(...WESTERN.map(e => ({...e, kind:'w'})));
        if (mode === 'chinese' || mode === 'both') list.push(...CHINESE.map(e => ({...e, kind:'c'})));
        return list;
      }, [mode]);

      const isStarInActiveEdge = (sid) => activeEdge?.stars.includes(sid);
      const starBelongsToBoth = (sid) => {
        const { w, c } = edgesOfStar(sid);
        return w.length > 0 && c.length > 0;
      };

      // 生成稳定的背景暗星（随机但固定）
      const bgStars = useMemo(() => {
        const arr = [];
        let seed = 42;
        const rand = () => {
          seed = (seed * 16807) % 2147483647;
          return seed / 2147483647;
        };
        for (let i = 0; i < 120; i++) {
          arr.push({
            x: rand() * 900, y: rand() * 650,
            r: rand() * 0.8 + 0.2,
            op: rand() * 0.6 + 0.2
          });
        }
        return arr;
      }, []);

      return (
        <section className="viz-section" id="atlas">
          <div className="viz-header">
            <div className="section-tag">The Atlas · 完整星图</div>
            <h2 className="section-title">Walk the Hypergraph.</h2>
            <div className="section-title-cn">遨 游 星 海</div>
            <p className="section-intro">
              这是 30 颗真实亮星的完整超图。每颗星按其<span className="gold">光谱色彩</span>（O/B/A/F/G/K/M）
              真实染色，带有<span className="blue">十字星芒</span>与<span className="highlight">星等缩放</span>。
              <br/>
              冷青色实线是 16 条<span className="blue">西方希腊超边</span>，暖金色虚线是 15 条
              <span className="gold">中国星官超边</span>。悬停、点击、切换模式，亲手感受超图的层层叠叠。
            </p>
          </div>

          <div className="viz-shell">
            <div className="viz-grid">
              {/* 左栏 */}
              <aside className="panel-side scroll-panel">
                <div className="panel-section-title">View Mode · 视图模式</div>
                <div className="mode-buttons">
                  {[
                    { v: 'both',    label: '叠加' },
                    { v: 'western', label: '西方' },
                    { v: 'chinese', label: '中国' },
                    { v: 'none',    label: '仅星空' },
                  ].map(o => (
                    <button key={o.v} className={`btn ${mode===o.v?'active':''}`}
                      onClick={() => setMode(o.v)}>{o.label}</button>
                  ))}
                </div>

                {(mode === 'western' || mode === 'both') && (
                  <div className="edge-list-section">
                    <div className="edge-list-title w">Greco-Roman · 希腊星座</div>
                    {WESTERN.map(e => (
                      <div key={e.id}
                           className={`edge-item ${lockedEdge?.id===e.id?'locked w':''}`}
                           onMouseEnter={() => setHoveredEdge({...e, kind:'w'})}
                           onMouseLeave={() => setHoveredEdge(null)}
                           onClick={() => setLockedEdge(lockedEdge?.id===e.id ? null : {...e, kind:'w'})}>
                        <span className="name-w">{e.zh}</span>
                        <span className="count">·{e.stars.length}</span>
                      </div>
                    ))}
                  </div>
                )}

                {(mode === 'chinese' || mode === 'both') && (
                  <div className="edge-list-section">
                    <div className="edge-list-title c">中国星官 · Asterisms</div>
                    {CHINESE.map(e => (
                      <div key={e.id}
                           className={`edge-item ${lockedEdge?.id===e.id?'locked c':''}`}
                           onMouseEnter={() => setHoveredEdge({...e, kind:'c'})}
                           onMouseLeave={() => setHoveredEdge(null)}
                           onClick={() => setLockedEdge(lockedEdge?.id===e.id ? null : {...e, kind:'c'})}>

                        <span className="count">·{e.stars.length}</span>

                  </div>

                </div>
              </aside>

              {/* 中央 SVG */}
              <main style={{ position: 'relative', overflow: 'hidden', minHeight: 640 }}>
                <svg viewBox="0 0 900 650" style={{ width: '100%', height: '100%', display: 'block' }}>
                  <defs>
                    {/* 星辉渐变 */}
                    <radialGradient id="star-glow-rad" cx="50%" cy="50%">
                      <stop offset="0%" stopColor="#ffffff" stopOpacity="1" />
                      <stop offset="50%" stopColor="currentColor" stopOpacity="0.6" />

                    </radialGradient>
                    {/* 高斯模糊滤镜 ， 供超边 */}

                        <feMergeNode in="SourceGraphic" />

                    </filter>
                    {/* 银河渐变 */}
                    <linearGradient id="milkyway" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stopColor="#6c4b9c" stopOpacity="0" />
                      <stop offset="30%" stopColor="#8B5FBF" stopOpacity="0.15" />
                      <stop offset="55%" stopColor="#d4a9ff" stopOpacity="0.18" />
                      <stop offset="80%" stopColor="#c76b9e" stopOpacity="0.12" />
                      <stop offset="100%" stopColor="#6c4b9c" stopOpacity="0" />

                    {/* 星云色彩 */}
                    <radialGradient id="nebula-1" cx="50%" cy="50%">
                      <stop offset="0%" stopColor="#7c4fbd" stopOpacity="0.25" />
                      <stop offset="100%" stopColor="#7c4fbd" stopOpacity="0" />
                    </radialGradient>
                    <radialGradient id="nebula-2" cx="50%" cy="50%">
                      <stop offset="0%" stopColor="#bd4f7c" stopOpacity="0.18" />
                      <stop offset="100%" stopColor="#bd4f7c" stopOpacity="0" />
                    </radialGradient>
                    <radialGradient id="nebula-3" cx="50%" cy="50%">
                      <stop offset="0%" stopColor="#4f7cbd" stopOpacity="0.18" />
                      <stop offset="100%" stopColor="#4f7cbd" stopOpacity="0" />
                    </radialGradient>
                  </defs>

                  {/* 背景深空底色 */}
                  <rect width="900" height="650" fill="#050314" />

                  {/* 星云团 */}
                  <ellipse cx="200" cy="180" rx="220" ry="160" fill="url(#nebula-1)" />

                  <ellipse cx="480" cy="380" rx="280" ry="120" fill="url(#nebula-3)" />

                  {/* 银河拱带 */}
                  <ellipse cx="520" cy="360" rx="460" ry="80" fill="url(#milkyway)" 
                           transform="rotate(-28 520 360)" filter="url(#star-glow)" opacity="0.75" />
                  <ellipse cx="520" cy="360" rx="380" ry="40" fill="url(#milkyway)"
                           transform="rotate(-28 520 360)" opacity="0.6" />

                  {/* 随机背景暗星 */}
                  <g>
                    {bgStars.map((s, i) => (
                      <circle key={i} cx={s.x} cy={s.y} r={s.r} fill="#ffffff" opacity={s.op} />
                    ))}
                  </g>

                  {/* 超边 · 光晕层（模糊） */}
                  <g filter="url(#edge-glow)" style={{ mixBlendMode: 'screen' }}>
                    {visibleEdges.map(e => {
                      const eStars = e.stars.map(sid => starById[sid]).filter(Boolean);
                      const path = hyperedgePath(eStars, 30);
                      const isActive = activeEdge?.id === e.id;
                      const isDim = activeEdge && !isActive;
                      const isHL = activeStar && e.stars.includes(activeStar.id);
                      const color = e.kind === 'w' ? '#6BD4FF' : '#FFB347';
                      const glowOp = isActive ? 0.55 : isHL ? 0.45 : isDim ? 0.05 : 0.28;
                      return (
                        <path key={e.id+'-glow'} d={path}
                              fill={color} fillOpacity={glowOp*0.4}
                              stroke={color} strokeOpacity={glowOp}
                              strokeWidth={isActive ? 6 : 4.5}
                              pointerEvents="none" />
                      );
                    })}
                  </g>

                  {/* 超边 · 清晰层（锐利轮廓，交互层） */}
                  <g>
                    {visibleEdges.map(e => {
                      const eStars = e.stars.map(sid => starById[sid]).filter(Boolean);
                      const path = hyperedgePath(eStars, 30);
                      const isActive = activeEdge?.id === e.id;
                      const isDim = activeEdge && !isActive;
                      const isHL = activeStar && e.stars.includes(activeStar.id);
                      const color = e.kind === 'w' ? '#6BD4FF' : '#FFB347';
                      const fillOp = isActive ? 0.32 : isHL ? 0.25 : isDim ? 0.04 : 0.16;
                      const strokeOp = isActive ? 1.0 : isHL ? 0.95 : isDim ? 0.2 : 0.8;
                      const sw = isActive ? 2.8 : isHL ? 2.2 : 1.8;
                      return (
                        <path key={e.id} d={path} fill={color} fillOpacity={fillOp}
                              stroke={color} strokeOpacity={strokeOp}
                              strokeWidth={sw}
                              strokeDasharray={e.kind === 'c' ? '6 3' : 'none'}
                              className="edge-path"
                              onMouseEnter={() => setHoveredEdge(e)}
                              onMouseLeave={() => setHoveredEdge(null)}
                              onClick={() => setLockedEdge(lockedEdge?.id===e.id ? null : e)} />
                      );
                    })}
                  </g>

                  {/* 超边标签 */}
                  <g style={{ pointerEvents: 'none' }}>
                    {visibleEdges.map(e => {
                      const eStars = e.stars.map(sid => starById[sid]).filter(Boolean);
                      if (eStars.length === 0) return null;
                      const cx = eStars.reduce((s, p) => s + p.x, 0) / eStars.length;
                      const cy = eStars.reduce((s, p) => s + p.y, 0) / eStars.length;
                      const isActive = activeEdge?.id === e.id;
                      const isHL = activeStar && e.stars.includes(activeStar.id);
                      const visible = isActive || isHL || !activeEdge;
                      if (!visible && !isActive) return null;
                      const color = e.kind === 'w' ? '#BFE8FF' : '#ffe2a8';
                      return (
                        <text key={e.id+'-l'} x={cx} y={cy - 2} textAnchor="middle" fill={color}
                              fontSize={isActive ? 15 : 11}
                              fontFamily={e.kind==='c' ? "'Noto Serif SC', serif" : "'Cormorant Garamond', serif"}
                              fontStyle={e.kind==='w' ? 'italic' : 'normal'}
                              fontWeight={isActive ? 600 : 400}
                              opacity={isActive ? 1 : isHL ? 0.8 : 0.38}
                              style={{ letterSpacing: '1px', transition: 'all 0.3s',
                                       textShadow: '0 0 8px rgba(0,0,0,0.8)' }}>
                          {e.name}
                        </text>
                      );
                    })}
                  </g>

                  {/* 真实恒星层 */}
                  <g>
                    {STARS.map(s => {
                      const isActive = activeStar?.id === s.id;
                      const inAE = isStarInActiveEdge(s.id);
                      const dim = activeEdge && !inAE;
                      return (
                        <RealisticStar key={s.id} star={s}
                          isActive={isActive} isDim={dim} showSpike={true}
                          onMouseEnter={() => setHoveredStar(s)}
                          onMouseLeave={() => setHoveredStar(null)}
                          onClick={() => setLockedStar(lockedStar?.id===s.id ? null : s)} />
                      );
                    })}
                  </g>

                  {/* 星名标签（仅活动星） */}
                  {activeStar && (
                    <g style={{ pointerEvents: 'none' }}>
                      <rect x={activeStar.x + 12} y={activeStar.y - 22}
                            width={(activeStar.en.length + activeStar.zh.length) * 4 + 20}
                            height="40" fill="rgba(5,3,15,0.85)"
                            stroke="rgba(255,255,255,0.15)" strokeWidth="0.5" rx="2" />
                      <text x={activeStar.x + 20} y={activeStar.y - 8}
                            fill="#fff" fontSize="12"
                            fontFamily="'JetBrains Mono', monospace" fontWeight="500">
                        {activeStar.en} · {activeStar.spec}
                      </text>
                      <text x={activeStar.x + 20} y={activeStar.y + 8}
                            fill="#fde68a" fontSize="12"
                            fontFamily="'Noto Serif SC', serif">
                        {activeStar.zh}
                      </text>
                    </g>
                  )}

                  {/* 底部数据统计 */}
                  <g style={{ pointerEvents: 'none' }} opacity="0.55">
                    <text x="20" y="638" fill="#6b6552" fontSize="10"
                          fontFamily="'JetBrains Mono', monospace" letterSpacing="2">
                      HYPERGRAPH H = (V, E) · |V| = {STARS.length} · |E| = {WESTERN.length + CHINESE.length}
                    </text>
                    <text x="880" y="638" fill="#6b6552" fontSize="10" textAnchor="end"
                          fontFamily="'JetBrains Mono', monospace" letterSpacing="2">
                      viewBox · J2000 epoch
                    </text>
                  </g>
                </svg>
              </main>

              {/* 右栏详情 */}
              <aside className="panel-side right scroll-panel">
                {!activeStar && !activeEdge && (
                  <div className="detail-empty">
                    <p>当你悬停一颗<strong>恒星</strong>，所有包含它的超边都会同时点亮。这就是超图的<span className="gold">「多重身份」</span>。</p>
                    <p>点击<strong>超边</strong>则可读到它背后的神话。</p>
                    <div className="detail-tip">
                      Try this:<br/>
                      → 悬停 <span className="gold">Altair · 牛郎星</span><br/>
                      → 点击 <span className="blue">Orion</span> 与 <span className="gold">参宿</span> 对比<br/>
                      → 切换「叠加」模式<br/>
                      → 注意 Betelgeuse 与 Antares 的红色
                    </div>
                  </div>
                )}

                {activeStar && (
                  <div className="detail-block">
                    <div className="detail-tag">Star Node · 恒星节点</div>
                    <div className="detail-name">{activeStar.en}</div>
                    <div className="detail-name-cn">{activeStar.zh}</div>
                    <div style={{ display: 'flex', gap: 14, marginTop: 8,
                                  fontFamily: "'JetBrains Mono', monospace", fontSize: 11 }}>
                      <span style={{ color: '#8b7f5f' }}>mag {activeStar.mag.toFixed(2)}</span>
                      <span style={{ color: getColor(activeStar.spec) }}>
                        ● {activeStar.spec}型
                      </span>
                    </div>
                    {(() => {
                      const { w, c } = edgesOfStar(activeStar.id);
                      return (
                        <div style={{ marginTop: 22 }}>
                          <div className="detail-tag" style={{ marginBottom: 10 }}>
                            所属超边 · {w.length + c.length} hyperedges

                          {w.map(e => (
                            <div key={e.id} className="edge-card w">
                              <div className="edge-card-name">{e.name} <span style={{ color: '#5b6680', fontSize: 13 }}>· {e.zh}</span></div>
                              <div className="edge-card-myth">{e.myth}</div>
                            </div>
                          ))}
                          {c.map(e => (
                            <div key={e.id} className="edge-card c">
                              <div className="edge-card-name">{e.name}</div>
                              <div className="edge-card-myth">{e.myth}</div>
                            </div>
                          ))}
                          {w.length > 0 && c.length > 0 && (
                            <div className="dual-note">
                              ✦ 这颗星同时归属于两种文明的超边，是超图中被多边共享的节点。

                        </div>

                      color: activeEdge.kind==='w'?'#BFE8FF':'#ffe2a8',
                      fontStyle: activeEdge.kind==='w'?'italic':'normal',
                      fontFamily: activeEdge.kind==='w'?"'Cormorant Garamond', serif":"'Noto Serif SC', serif"
                    }}>
                      {activeEdge.name}
                    </div>
                    {activeEdge.kind==='w' && (
                      <div className="detail-name-cn" style={{ color: '#e8e3d3' }}>{activeEdge.zh}</div>
                    )}
                    <div className="detail-meta">|E| = {activeEdge.stars.length} stars</div>
                    <div style={{
                      marginTop: 18, color: '#c5bfa9', fontSize: 14, lineHeight: 1.95,
                      fontFamily: "'Noto Serif SC', serif", fontWeight: 300
                    }}>
                      {activeEdge.myth}
                    </div>
                    <div className="detail-tag" style={{ marginTop: 22, marginBottom: 8 }}>
                      Stars · 包含恒星

                    {activeEdge.stars.map(sid => {
                      const s = starById[sid]; if (!s) return null;

                        <div key={sid} style={{

                          borderBottom: '1px solid rgba(255,255,255,0.04)'

                            <span style={{

                            <span style={{ color: '#8b7f5f', marginLeft: 8,
                                          fontFamily: "'Noto Serif SC', serif" }}>{s.zh}</span>

            </div>
          </div>
        </section>

    // ==================== Discoveries（扩展为 6 张） ====================
    function DiscoveryMiniMap({ stars, positions, edgeColors }) {
      // stars: [{x,y,r,color}]
      // edgeColors: {w, c} or null
      return (
        <svg viewBox="0 0 300 110" width="100%" height="100%">
          <defs>
            <radialGradient id="mini-glow-2" cx="50%" cy="50%">
              <stop offset="0%" stopColor="#ffffff" stopOpacity="1" />

              <stop offset="100%" stopColor="currentColor" stopOpacity="0" />
            </radialGradient>
          </defs>
          {/* 两条重叠超边 */}
          {edgeColors && stars.length >= 2 && (
            <>
              <path d={hyperedgePath(stars.map(s=>({x:s.x,y:s.y})), 14)}
                    fill={edgeColors.w} fillOpacity="0.16"
                    stroke={edgeColors.w} strokeOpacity="0.7" strokeWidth="1.2" />
              <path d={hyperedgePath(stars.map(s=>({x:s.x+3,y:s.y+3})), 10)}
                    fill={edgeColors.c} fillOpacity="0.16"
                    stroke={edgeColors.c} strokeOpacity="0.7" strokeWidth="1.2"
                    strokeDasharray="3 2" />
            </>
          )}
          {stars.map((s, i) => (
            <g key={i}>
              <circle cx={s.x} cy={s.y} r={s.r * 3} fill={s.color || '#fef3c7'}
                      opacity="0.35" filter="blur(2px)" />
