    // ==================== 几何工具 ====================
    function convexHull(pts) {
      if (pts.length < 3) return pts.slice();
      const p = pts.slice().sort((a, b) => a.x - b.x || a.y - b.y);
      const cross = (O, A, B) => (A.x - O.x) * (B.y - O.y) - (A.y - O.y) * (B.x - O.x);
      const lower = [];
      for (const q of p) {
        while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], q) <= 0) lower.pop();
        lower.push(q);
      }
      const upper = [];
      for (let i = p.length - 1; i >= 0; i--) {
        const q = p[i];
        while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], q) <= 0) upper.pop();
        upper.push(q);
      }
      lower.pop(); upper.pop();
      return lower.concat(upper);
    }

    function hyperedgePath(stars, padding = 26) {
      if (stars.length === 0) return '';
      if (stars.length === 1) {
        const s = stars[0];
        return `M ${s.x - padding} ${s.y} a ${padding} ${padding} 0 1 0 ${padding*2} 0 a ${padding} ${padding} 0 1 0 ${-padding*2} 0 Z`;
      }
      if (stars.length === 2) {
        const [a, b] = stars;
        const dx = b.x - a.x, dy = b.y - a.y;
        const len = Math.sqrt(dx*dx + dy*dy) || 1;
        const nx = -dy / len * padding, ny = dx / len * padding;
        return `M ${a.x + nx} ${a.y + ny}
                L ${b.x + nx} ${b.y + ny}
                A ${padding} ${padding} 0 0 1 ${b.x - nx} ${b.y - ny}
                L ${a.x - nx} ${a.y - ny}
                A ${padding} ${padding} 0 0 1 ${a.x + nx} ${a.y + ny} Z`;
      }
      const hull = convexHull(stars);
      const cx = hull.reduce((s, p) => s + p.x, 0) / hull.length;
      const cy = hull.reduce((s, p) => s + p.y, 0) / hull.length;
      const expanded = hull.map(p => {
        const dx = p.x - cx, dy = p.y - cy;
        const len = Math.sqrt(dx*dx + dy*dy) || 1;
        return { x: p.x + dx/len*padding, y: p.y + dy/len*padding };
      });
      let d = `M ${expanded[0].x} ${expanded[0].y}`;
      for (let i = 0; i < expanded.length; i++) {
        const cur = expanded[i];
        const next = expanded[(i + 1) % expanded.length];
        const mx = (cur.x + next.x) / 2;
        const my = (cur.y + next.y) / 2;
        d += ` Q ${cur.x} ${cur.y} ${mx} ${my}`;
      }
      d += ' Z';
      return d;
    }

    function magToRadius(mag) {
      return Math.max(1.2, 4.5 - mag * 0.9);
    }

        return activeEdge.stars.includes(starId);

                </div>

                             background: 'linear-gradient(90deg, #fde68a 0%, #e8e3d3 50%, #bfdbfe 100%)',
                             WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
                  星空超图 · Celestial Hypergraph
                </h1>
                <div style={{ fontSize: 16, color: '#b8b29c', marginTop: 6, fontStyle: 'italic', fontFamily: "'Noto Serif SC', serif" }}>
                  同一片星空，两种文明——每颗星都拥有多重身份
                </div>
              </div>
              <div style={{ textAlign: 'right', fontSize: 13, color: '#8b7f5f', fontFamily: "'JetBrains Mono', monospace" }}>
                <div>{STARS.length} 颗亮星 · {WESTERN.length} 个西方星座 · {CHINESE.length} 个中国星官</div>
                <div style={{ marginTop: 4 }}>{stats.bothCount} / {stats.total} 颗星同属双文明超边</div>

            </div>
          </header>

          <div style={{ display: 'grid', gridTemplateColumns: '260px 1fr 320px', gap: 0, height: 'calc(100vh - 130px)' }}>
            <aside style={{ padding: '20px 20px', borderRight: '1px solid rgba(255,255,255,0.06)', overflowY: 'auto' }} className="scroll-panel">
              <div style={{ fontSize: 11, letterSpacing: '2px', color: '#8b7f5f', textTransform: 'uppercase', marginBottom: 10 }}>视图模式</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 24 }}>
                {[
                  { v: 'both',    label: '叠加' },
                  { v: 'western', label: '西方' },
                  { v: 'chinese', label: '中国' },
                  { v: 'none',    label: '仅星空' },
                ].map(o => (
                  <button key={o.v} className={`btn ${mode===o.v?'active':''} ${mode===o.v&&o.v==='western'?'w':''}`}
                    onClick={() => setMode(o.v)}>{o.label}</button>
                ))}
              </div>

              {(mode === 'western' || mode === 'both') && (
                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 11, letterSpacing: '2px', color: '#60a5fa', textTransform: 'uppercase', marginBottom: 8 }}>西方 · Greco-Roman</div>
                  {WESTERN.map(e => (
                    <div key={e.id} className="edge-item"
                         onMouseEnter={() => setHoveredEdge({...e, kind:'w'})}
                         onMouseLeave={() => setHoveredEdge(null)}
                         onClick={() => setLockedEdge(lockedEdge?.id===e.id ? null : {...e, kind:'w'})}
                         style={{ padding: '5px 8px', fontSize: 14, cursor: 'pointer', borderRadius: 3,
                                  background: lockedEdge?.id===e.id ? 'rgba(96,165,250,0.1)' : 'transparent' }}>
                      <span style={{ color: '#bfdbfe' }}>{e.zh}</span>
                      <span style={{ color: '#6b7280', fontSize: 12, marginLeft: 6, fontFamily: 'JetBrains Mono, monospace' }}>·{e.stars.length}</span>
                    </div>
                  ))}
                </div>
              )}

              {(mode === 'chinese' || mode === 'both') && (
                <div>
                  <div style={{ fontSize: 11, letterSpacing: '2px', color: '#fbbf24', textTransform: 'uppercase', marginBottom: 8 }}>中国 · 二十八宿</div>
                  {CHINESE.map(e => (
                    <div key={e.id} className="edge-item"
                         onMouseEnter={() => setHoveredEdge({...e, kind:'c'})}
                         onMouseLeave={() => setHoveredEdge(null)}
                         onClick={() => setLockedEdge(lockedEdge?.id===e.id ? null : {...e, kind:'c'})}
                         style={{ padding: '5px 8px', fontSize: 14, cursor: 'pointer', borderRadius: 3,
                                  background: lockedEdge?.id===e.id ? 'rgba(251,191,36,0.1)' : 'transparent',
                                  fontFamily: "'Noto Serif SC', serif" }}>
                      <span style={{ color: '#fde68a' }}>{e.name}</span>
                      <span style={{ color: '#6b7280', fontSize: 12, marginLeft: 6, fontFamily: 'JetBrains Mono, monospace' }}>·{e.stars.length}</span>
                    </div>
                  ))}
                </div>
              )}
            </aside>

            <main style={{ position: 'relative', overflow: 'hidden' }}>
              <svg viewBox="0 0 900 650" style={{ width: '100%', height: '100%', display: 'block' }}>
                <defs>
                  <radialGradient id="starGlow" cx="50%" cy="50%">
                    <stop offset="0%" stopColor="#ffffff" stopOpacity="1" />
                    <stop offset="40%" stopColor="#fff8e0" stopOpacity="0.9" />
                    <stop offset="100%" stopColor="#fff8e0" stopOpacity="0" />
                  </radialGradient>
                  <pattern id="starDust" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
                    {Array.from({ length: 14 }).map((_, i) => {
                      const x = (i * 37.3) % 100;
                      const y = (i * 53.7) % 100;
                      return <circle key={i} cx={x} cy={y} r="0.4" fill="#ffffff" opacity="0.25" />;
                    })}
                  </pattern>
                </defs>

                <rect width="900" height="650" fill="url(#starDust)" opacity="0.4" />
                <ellipse cx="520" cy="360" rx="420" ry="55" fill="white" opacity="0.028" transform="rotate(-28 520 360)" />
                <ellipse cx="520" cy="360" rx="340" ry="30" fill="white" opacity="0.035" transform="rotate(-28 520 360)" />

                <g>
                  {visibleEdges.map(e => {
                    const edgeStars = e.stars.map(sid => starById[sid]).filter(Boolean);
                    const path = hyperedgePath(edgeStars);
                    const isActive = activeEdge?.id === e.id;
                    const isDim = activeEdge && !isActive;
                    const isHighlightedByStar = activeStar && e.stars.includes(activeStar.id);
                    const color = e.kind === 'w' ? '#60a5fa' : '#fbbf24';
                    const fillOpacity = isActive ? 0.22 : isHighlightedByStar ? 0.18 : isDim ? 0.03 : 0.08;
                    const strokeOpacity = isActive ? 0.85 : isHighlightedByStar ? 0.7 : isDim ? 0.1 : 0.35;
                    return (
                      <path key={e.id} d={path} fill={color} fillOpacity={fillOpacity}
                            stroke={color} strokeOpacity={strokeOpacity}
                            strokeWidth={isActive ? 1.8 : 1}
                            className="edge-path"
                            style={{ cursor: 'pointer' }}
                            onMouseEnter={() => setHoveredEdge(e)}
                            onMouseLeave={() => setHoveredEdge(null)}
                            onClick={() => setLockedEdge(lockedEdge?.id===e.id ? null : e)} />
                    );
                  })}
                </g>

                <g style={{ pointerEvents: 'none' }}>
                  {visibleEdges.map(e => {
                    const edgeStars = e.stars.map(sid => starById[sid]).filter(Boolean);
                    if (edgeStars.length === 0) return null;
                    const cx = edgeStars.reduce((s, p) => s + p.x, 0) / edgeStars.length;
                    const cy = edgeStars.reduce((s, p) => s + p.y, 0) / edgeStars.length;
                    const isActive = activeEdge?.id === e.id;
                    const isHighlightedByStar = activeStar && e.stars.includes(activeStar.id);
                    const visible = isActive || isHighlightedByStar || !activeEdge;
                    if (!visible && !isActive) return null;
                    const color = e.kind === 'w' ? '#bfdbfe' : '#fde68a';
                    return (
                      <text key={e.id + '-label'} x={cx} y={cy - 2}
                            textAnchor="middle"
                            fill={color}
                            fontSize={isActive ? 14 : 11}
                            fontFamily={e.kind==='c' ? "'Noto Serif SC', serif" : "'Cormorant Garamond', serif"}
                            fontStyle={e.kind==='w' ? 'italic' : 'normal'}
                            opacity={isActive ? 0.95 : isHighlightedByStar ? 0.75 : 0.35}
                            style={{ letterSpacing: '1px', transition: 'all 0.3s' }}>
                        {e.kind === 'w' ? e.name : e.name}
                      </text>
                    );
                  })}
                </g>

                <g>
                  {STARS.map(s => {
                    const r = magToRadius(s.mag);
                    const isActive = activeStar?.id === s.id;
                    const inActiveEdge = isStarInActiveEdge(s.id);
                    const both = starBelongsToBoth(s.id);
                    const dim = activeEdge && !inActiveEdge;
                    return (
                      <g key={s.id}
                         onMouseEnter={() => setHoveredStar(s)}
                         onMouseLeave={() => setHoveredStar(null)}
                         onClick={() => setLockedStar(lockedStar?.id===s.id ? null : s)}
                         style={{ cursor: 'pointer' }}>
                        <circle cx={s.x} cy={s.y} r={r * 3.5}
                                fill="url(#starGlow)"
                                opacity={isActive ? 0.9 : dim ? 0.15 : 0.5}
                                style={{ transition: 'opacity 0.3s' }} />
                        <circle className="star-pt" cx={s.x} cy={s.y} r={r}
                                fill={isActive ? '#fff' : '#fef3c7'}
                                opacity={dim ? 0.3 : 1}
                                style={{ animationDelay: `${(s.x + s.y) % 3}s` }} />
                        {both && mode === 'both' && !dim && (
                          <circle cx={s.x} cy={s.y} r={r * 2.2}
                                  fill="none" stroke="#e8e3d3" strokeWidth="0.5"
                                  opacity={isActive ? 0.8 : 0.3}
                                  strokeDasharray="1 2" />
                        )}
                        {isActive && (
                          <g style={{ pointerEvents: 'none' }}>
                            <text x={s.x + 10} y={s.y - 8} fill="#fff" fontSize="12"
                                  fontFamily="'JetBrains Mono', monospace" fontWeight="500">
                              {s.en}
                            </text>
                            <text x={s.x + 10} y={s.y + 6} fill="#fde68a" fontSize="12"
                                  fontFamily="'Noto Serif SC', serif">
                              {s.zh}
                            </text>
                          </g>
                        )}
                        <circle cx={s.x} cy={s.y} r={Math.max(r * 3, 10)} fill="transparent" />
                      </g>
                    );
                  })}
                </g>

                <text x={20} y={640} fill="#4a4533" fontSize="11" fontFamily="'JetBrains Mono', monospace">
                  hover 恒星 / 星座 · click 锁定 · 切换模式看超图重组
                </text>
              </svg>
            </main>

            <aside style={{ padding: '20px', borderLeft: '1px solid rgba(255,255,255,0.06)', overflowY: 'auto' }} className="scroll-panel">
              {!activeStar && !activeEdge && (
                <div style={{ color: '#6b6552', fontSize: 14, lineHeight: 1.8, fontStyle: 'italic' }}>
                  <p style={{ marginTop: 0 }}>超图（hypergraph）的一条「超边」可连接任意多个节点——传统图只能连两点。</p>
                  <p>这里，<strong style={{ color: '#e8e3d3', fontStyle: 'normal' }}>每个星座都是一条超边</strong>，圈住若干恒星。</p>
                  <p>当你叠加两种文明的超图，会发现：同一颗星<strong style={{ color: '#fde68a', fontStyle: 'normal' }}>同时归属于多条超边</strong>——这正是超图比普通图更本质的地方。</p>
                  <div style={{ marginTop: 26, padding: '14px 0', borderTop: '1px solid rgba(255,255,255,0.08)', fontSize: 12, color: '#8b7f5f' }}>
                    <div style={{ marginBottom: 6 }}>试试这些：</div>
                    <div>· 悬停<span style={{ color: '#fde68a' }}>牛郎星</span> 看它的双重身份</div>
                    <div>· 点击<span style={{ color: '#bfdbfe' }}>猎户座</span> 与<span style={{ color: '#fde68a' }}>参宿</span> 对比</div>
                    <div>· 切换「叠加」模式看超边交织</div>
                  </div>
                </div>
              )}

              {activeStar && (
                <div>
                  <div style={{ fontSize: 11, letterSpacing: '2px', color: '#8b7f5f', textTransform: 'uppercase', marginBottom: 4 }}>恒星节点</div>
                  <div style={{ fontSize: 26, color: '#fff', fontFamily: "'Cormorant Garamond', serif", fontStyle: 'italic' }}>{activeStar.en}</div>
                  <div style={{ fontSize: 20, color: '#fde68a', fontFamily: "'Noto Serif SC', serif", marginTop: 2 }}>{activeStar.zh}</div>
                  <div style={{ fontSize: 12, color: '#6b6552', fontFamily: 'JetBrains Mono, monospace', marginTop: 6 }}>
                    视星等 mag {activeStar.mag.toFixed(2)}
                  </div>

                  {(() => {
                    const { w, c } = edgesOfStar(activeStar.id);
                    return (
                      <div style={{ marginTop: 22 }}>
                        <div style={{ fontSize: 11, letterSpacing: '2px', color: '#8b7f5f', textTransform: 'uppercase', marginBottom: 10 }}>
                          所属超边 · {w.length + c.length} 条
                        </div>
                        {w.map(e => (
                          <div key={e.id} style={{ marginBottom: 12, padding: '10px 12px', background: 'rgba(96,165,250,0.06)', borderLeft: '2px solid #60a5fa' }}>
                            <div style={{ color: '#bfdbfe', fontSize: 15, fontStyle: 'italic' }}>{e.name} <span style={{ color: '#6b7280', fontSize: 13 }}>· {e.zh}</span></div>
                            <div style={{ color: '#a8a391', fontSize: 13, lineHeight: 1.6, marginTop: 5, fontFamily: "'Noto Serif SC', serif" }}>{e.myth}</div>
                          </div>
                        ))}
                        {c.map(e => (
                          <div key={e.id} style={{ marginBottom: 12, padding: '10px 12px', background: 'rgba(251,191,36,0.06)', borderLeft: '2px solid #fbbf24' }}>
                            <div style={{ color: '#fde68a', fontSize: 15, fontFamily: "'Noto Serif SC', serif" }}>{e.name}</div>
                            <div style={{ color: '#a8a391', fontSize: 13, lineHeight: 1.7, marginTop: 5, fontFamily: "'Noto Serif SC', serif" }}>{e.myth}</div>
                          </div>
                        ))}
                        {w.length > 0 && c.length > 0 && (
                          <div style={{ marginTop: 16, padding: '10px 12px', background: 'rgba(232,227,211,0.04)',
                                        border: '1px dashed rgba(232,227,211,0.2)', fontSize: 12, color: '#b8b29c', fontStyle: 'italic' }}>
                            ✦ 这颗星同时属于西方与中国的星座体系——在超图中，它是一个被多条超边共享的节点。
                          </div>
                        )}
                      </div>
                    );
                  })()}
                </div>
              )}

              {!activeStar && activeEdge && (
                <div>
                  <div style={{ fontSize: 11, letterSpacing: '2px',
                                color: activeEdge.kind==='w'?'#60a5fa':'#fbbf24',
                                textTransform: 'uppercase', marginBottom: 4 }}>
                    {activeEdge.kind==='w' ? '西方超边 · Hyperedge' : '中国超边 · 星官'}
                  </div>
                  <div style={{ fontSize: 28, color: activeEdge.kind==='w'?'#bfdbfe':'#fde68a',
                                fontFamily: activeEdge.kind==='w'?"'Cormorant Garamond', serif":"'Noto Serif SC', serif",
                                fontStyle: activeEdge.kind==='w'?'italic':'normal' }}>
                    {activeEdge.name}
                  </div>
                  {activeEdge.kind==='w' && (
                    <div style={{ fontSize: 18, color: '#e8e3d3', fontFamily: "'Noto Serif SC', serif", marginTop: 2 }}>
                      {activeEdge.zh}
                    </div>
                  )}
                  <div style={{ fontSize: 13, color: '#6b6552', fontFamily: 'JetBrains Mono, monospace', marginTop: 8 }}>
                    |E| = {activeEdge.stars.length} stars
                  </div>

                  <div style={{ marginTop: 18, color: '#c5bfa9', fontSize: 14, lineHeight: 1.9,
                                fontFamily: "'Noto Serif SC', serif" }}>
                    {activeEdge.myth}
                  </div>

                  <div style={{ marginTop: 22, fontSize: 11, letterSpacing: '2px', color: '#8b7f5f', textTransform: 'uppercase', marginBottom: 8 }}>
                    包含恒星
                  </div>
                  {activeEdge.stars.map(sid => {
                    const s = starById[sid];
                    if (!s) return null;
                    return (
                      <div key={sid} style={{ padding: '4px 0', fontSize: 14, display: 'flex', justifyContent: 'space-between' }}>
                        <span>
                          <span style={{ color: '#e8e3d3', fontStyle: 'italic' }}>{s.en}</span>
                          <span style={{ color: '#8b7f5f', marginLeft: 8, fontFamily: "'Noto Serif SC', serif" }}>{s.zh}</span>
                        </span>
                        <span style={{ color: '#4a4533', fontFamily: 'JetBrains Mono, monospace', fontSize: 12 }}>
                          {s.mag.toFixed(1)}
                        </span>
                      </div>
                    );
                  })}
                </div>
              )}
            </aside>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<StarHypergraph />);
  </script>
</body>
</html>
