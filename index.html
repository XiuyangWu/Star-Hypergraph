<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星空超图 · Celestial Hypergraph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Noto+Serif+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #03020a; overflow-x: hidden; }
    body { font-family: 'Cormorant Garamond', 'Noto Serif SC', serif; color: #e8e3d3; }

    /* ================ 背景星空层 ================ */
    .cosmos-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(85, 50, 150, 0.35), transparent 60%),
        radial-gradient(ellipse 50% 30% at 85% 75%, rgba(180, 60, 90, 0.20), transparent 55%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(40, 80, 180, 0.18), transparent 60%),
        linear-gradient(180deg, #050214 0%, #02010a 50%, #060218 100%);
    }
    .cosmos-bg::before {
      content: '';
      position: absolute; inset: 0;
      background-image: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=2400&q=80&auto=format&fm=jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.28;
      mix-blend-mode: screen;
      filter: contrast(1.1) saturate(1.2);
    }
    .cosmos-bg::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 20% 50%, rgba(0,0,0,0) 0%, rgba(3,2,10,0.4) 70%),
        radial-gradient(circle at 80% 50%, rgba(0,0,0,0) 0%, rgba(3,2,10,0.4) 70%);
    }

    /* CSS 星点（前景层） */
    .star-field {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
    }
    .css-star {
      position: absolute; border-radius: 50%; background: white;
      animation: twinkle 4s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: var(--base-op, 0.5); }
      50% { opacity: 1; }
    }
    @keyframes drift-slow {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(10px, -8px); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.95); opacity: 1; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    @keyframes scrollHint {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50%      { transform: translateY(8px); opacity: 1; }
    }

    .content-layer { position: relative; z-index: 2; }

    /* ================ Hero ================ */
    .hero {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 60px 20px; position: relative;
    }
    .hero-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 4px; color: #8b7f5f;
      text-transform: uppercase; margin-bottom: 32px;
      animation: fadeIn 1.2s ease 0.2s both;
    }
    .hero-tag .dot {
      display: inline-block; width: 4px; height: 4px;
      background: #fbbf24; border-radius: 50%; margin: 0 12px;
      vertical-align: middle;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 8vw, 110px);
      font-weight: 500; font-style: italic;
      letter-spacing: 1px; line-height: 1; margin-bottom: 8px;
      background: linear-gradient(110deg, #ffe5b8 0%, #ffffff 25%, #c4a8ff 50%, #ffffff 75%, #ffd9a8 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeInUp 1.4s ease 0.4s both, shimmer 8s ease infinite;
    }
    .hero-title-cn {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(28px, 4.5vw, 56px);
      font-weight: 400; color: #ffffff;
      letter-spacing: 12px; margin: 16px 0 32px;
      opacity: 0.92;
      animation: fadeInUp 1.4s ease 0.7s both;
    }
    .hero-poem {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(15px, 1.6vw, 19px);
      color: #b8b29c; line-height: 2.2;
      max-width: 580px; margin: 0 auto 48px;
      font-weight: 300; letter-spacing: 2px;
      animation: fadeIn 1.6s ease 1s both;
    }
    .hero-poem em {
      font-style: normal;
      color: #fde68a;
    }
    .hero-stats {
      display: flex; gap: 60px; margin-top: 24px;
      animation: fadeIn 1.4s ease 1.4s both;
      flex-wrap: wrap; justify-content: center;
    }
    .hero-stat {
      text-align: center;
    }
    .hero-stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px; font-weight: 600;
      color: #fde68a;
      font-variant-numeric: tabular-nums;
    }
    .hero-stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 2px; color: #6b6552;
      text-transform: uppercase; margin-top: 4px;
    }
    .scroll-hint {
      margin-top: 60px; font-size: 12px; color: #6b6552;
      letter-spacing: 3px; text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      animation: scrollHint 2s ease infinite, fadeIn 1s ease 2s both;
    }

    /* ================ Section divider ================ */
    .section-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 4px; color: #8b7f5f;
      text-transform: uppercase;
      display: inline-flex; align-items: center; gap: 12px;
    }
    .section-tag::before {
      content: ''; width: 30px; height: 1px; background: #8b7f5f;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 500; font-style: italic;
      color: #ffffff; margin: 16px 0 12px; line-height: 1.1;
    }
    .section-title-cn {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(20px, 2.5vw, 28px);
      color: #b8b29c; font-weight: 300;
      letter-spacing: 6px; margin-bottom: 32px;
    }

    /* ================ Insight Section ================ */
    .insight {
      padding: 100px 40px 80px;
      max-width: 1280px; margin: 0 auto;
    }
    .insight-grid {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 40px; align-items: center; margin-top: 60px;
    }
    .identity-card {
      background: linear-gradient(160deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2px; padding: 36px 32px;
      position: relative;
      transition: all 0.4s ease;
    }
    .identity-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.18);
    }
    .identity-card.west {
      border-top: 2px solid #6BD4FF;
      box-shadow: 0 0 60px rgba(107, 212, 255, 0.05);
    }
    .identity-card.cn {
      border-top: 2px solid #FFB347;
      box-shadow: 0 0 60px rgba(255, 179, 71, 0.05);
    }
    .identity-card .card-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .identity-card.west .card-tag { color: #6BD4FF; }
    .identity-card.cn .card-tag { color: #FFB347; }
    .identity-card .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px; font-weight: 600; font-style: italic;
      color: #fff; margin-bottom: 4px;
    }
    .identity-card.cn .card-name {
      font-family: 'Noto Serif SC', serif; font-style: normal;
    }
    .identity-card .card-sub {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px; color: #b8b29c; margin-bottom: 20px;
    }
    .identity-card .card-myth {
      font-family: 'Noto Serif SC', serif;
      font-size: 14px; line-height: 2; color: #c5bfa9;
      font-weight: 300;
    }
    .insight-bridge {
      text-align: center; padding: 0 8px;
    }
    .insight-bridge .star-icon {
      width: 60px; height: 60px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      margin: 0 auto 16px;
      position: relative;
    }
    .insight-bridge .star-icon::before {
      content: ''; position: absolute; inset: -8px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%; animation: pulse-ring 2.5s ease infinite;
    }
    .insight-bridge .star-icon::after {
      content: '✦'; color: #fde68a; font-size: 22px;
    }
    .insight-bridge .same-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 3px;
      color: #fde68a; text-transform: uppercase;
    }
    .insight-bridge .star-name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 18px; color: #fff;
      margin-top: 6px;
    }

    /* ================ Visualization Section ================ */
    .viz-section {
      padding: 80px 0 40px;
      max-width: 1480px; margin: 0 auto;
    }
    .viz-header {
      padding: 0 40px 40px;
      max-width: 1100px;
    }
    .viz-shell {
      margin: 0 32px;
      background: rgba(8, 6, 22, 0.55);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }
    .viz-grid {
      display: grid; grid-template-columns: 240px 1fr 320px;
      min-height: 700px;
    }

    .panel-side {
      padding: 28px 22px; overflow-y: auto;
      border-right: 1px solid rgba(255,255,255,0.05);
      max-height: 720px;
    }
    .panel-side.right {
      border-right: none;
      border-left: 1px solid rgba(255,255,255,0.05);
    }
    .panel-section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 3px;
      color: #8b7f5f; text-transform: uppercase;
      margin-bottom: 14px;
    }
    .mode-buttons { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 28px; }
    .btn {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      color: #c5bfa9;
      padding: 7px 13px;
      font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
      font-size: 14px; letter-spacing: 1px;
      cursor: pointer; transition: all 0.2s;
      border-radius: 2px;
    }
    .btn:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.2);
      color: #fff;
    }
    .btn.active {
      background: rgba(253, 230, 138, 0.1);
      border-color: rgba(253, 230, 138, 0.5);
      color: #fde68a;
    }
    .edge-list-section { margin-bottom: 22px; }
    .edge-list-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .edge-list-title.w { color: #6BD4FF; }
    .edge-list-title.c { color: #FFB347; }
    .edge-item {
      padding: 5px 8px; font-size: 14px; cursor: pointer;
      border-radius: 2px; transition: background 0.15s;
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .edge-item:hover { background: rgba(255,255,255,0.04); }
    .edge-item.locked.w { background: rgba(107, 212, 255, 0.1); }
    .edge-item.locked.c { background: rgba(255, 179, 71, 0.1); }
    .edge-item .name-w { color: #BFE8FF; font-style: italic; }
    .edge-item .name-c { color: #ffe2a8; font-family: 'Noto Serif SC', serif; }
    .edge-item .count {
      color: #5b5440; font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
    }
    .scroll-panel::-webkit-scrollbar { width: 4px; }
    .scroll-panel::-webkit-scrollbar-track { background: transparent; }
    .scroll-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .star-pt { animation: twinkle 3s ease-in-out infinite; }
    .edge-path { transition: opacity 0.4s, stroke-width 0.4s; cursor: pointer; }

    /* Detail panel */
    .detail-empty {
      color: #6b6552; font-size: 14px; line-height: 2; font-style: italic;
    }
    .detail-empty p { margin-bottom: 16px; }
    .detail-empty strong {
      color: #e8e3d3; font-style: normal; font-weight: 600;
    }
    .detail-empty .gold { color: #fde68a; }
    .detail-empty .blue { color: #BFE8FF; }
    .detail-tip {
      margin-top: 22px; padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: #6b6552;
      line-height: 2;
    }

    .detail-block { padding: 0 4px; }
    .detail-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 3px;
      color: #8b7f5f; text-transform: uppercase;
      margin-bottom: 6px;
    }
    .detail-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-style: italic; color: #fff;
      line-height: 1.1;
    }
    .detail-name-cn {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px; color: #fde68a; margin-top: 4px;
    }
    .detail-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: #6b6552; margin-top: 8px;
    }
    .edge-card {
      margin-top: 12px; padding: 12px 14px;
      border-left: 2px solid;
      border-radius: 2px;
    }
    .edge-card.w {
      background: rgba(107, 212, 255, 0.06);
      border-color: #6BD4FF;
    }
    .edge-card.c {
      background: rgba(255, 179, 71, 0.06);
      border-color: #FFB347;
    }
    .edge-card-name {
      font-size: 15px; margin-bottom: 4px;
    }
    .edge-card.w .edge-card-name {
      color: #BFE8FF; font-style: italic;
    }
    .edge-card.c .edge-card-name {
      color: #ffe2a8; font-family: 'Noto Serif SC', serif;
    }
    .edge-card-myth {
      font-family: 'Noto Serif SC', serif;
      font-size: 13px; line-height: 1.8; color: #a8a391;
      font-weight: 300;
    }
    .dual-note {
      margin-top: 14px; padding: 10px 12px;
      background: rgba(232, 227, 211, 0.04);
      border: 1px dashed rgba(232, 227, 211, 0.18);
      font-size: 12px; color: #b8b29c;
      font-style: italic; line-height: 1.7;
    }

    /* ================ Discovery Cards ================ */
    .discoveries {
      padding: 100px 40px;
      max-width: 1380px; margin: 0 auto;
    }
    .disc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 24px; margin-top: 60px;
    }
    .disc-card {
      background: linear-gradient(170deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 36px 30px 32px;
      border-radius: 2px;
      transition: all 0.4s;
      position: relative; overflow: hidden;
    }
    .disc-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, var(--glow, rgba(255,255,255,0.08)) 0%, transparent 70%);
      pointer-events: none;
    }
    .disc-card:hover {
      transform: translateY(-6px);
      border-color: rgba(255,255,255,0.18);
    }
    .disc-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px; font-style: italic; color: #5b5440;
      letter-spacing: 2px; margin-bottom: 14px;
    }
    .disc-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px; font-weight: 600; font-style: italic;
      color: #fff; margin-bottom: 4px; line-height: 1.2;
    }
    .disc-title-cn {
      font-family: 'Noto Serif SC', serif;
      font-size: 17px; color: #fde68a; margin-bottom: 18px;
      letter-spacing: 1px;
    }
    .disc-body {
      font-family: 'Noto Serif SC', serif;
      font-size: 14px; line-height: 2; color: #c5bfa9;
      font-weight: 300;
    }
    .disc-quote {
      margin-top: 20px; padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-family: 'Noto Serif SC', serif;
      font-style: italic; font-size: 13px;
      color: #8b7f5f;
    }

    /* ================ Footer ================ */
    .footer {
      padding: 60px 40px 40px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 60px;
    }
    .footer-line {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px; font-style: italic;
      color: #6b6552; letter-spacing: 2px;
      margin-bottom: 14px;
    }
    .footer-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 2px;
      color: #4a4533; line-height: 2;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .insight-grid { grid-template-columns: 1fr; }
      .insight-bridge { padding: 20px 0; }
      .viz-grid { grid-template-columns: 1fr; }
      .panel-side { max-height: 300px; }
      .viz-shell { margin: 0 12px; }
    }
  </style>
</head>
<body>
  <div class="cosmos-bg"></div>
  <div class="star-field" id="cssStarField"></div>
  <div class="content-layer">
    <div id="root"></div>
  </div>

  <script>
    // 生成 CSS 星点
    (function() {
      const field = document.getElementById('cssStarField');
      const count = 180;
      let html = '';
      for (let i = 0; i < count; i++) {
        const size = Math.random() < 0.85 ? Math.random() * 1.4 + 0.3 : Math.random() * 2.5 + 1.5;
        const op = 0.3 + Math.random() * 0.5;
        const left = Math.random() * 100;
        const top = Math.random() * 100;
        const delay = Math.random() * 4;
        html += `<div class="css-star" style="width:${size}px;height:${size}px;left:${left}%;top:${top}%;--base-op:${op};opacity:${op};animation-delay:${delay}s"></div>`;
      }
      field.innerHTML = html;
    })();
  </script>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect, useRef } = React;

    // ==================== 数据层 ====================
    const STARS = [
      { id: 'polaris', en: 'Polaris', zh: '勾陈一 / 北极星', mag: 2.0, x: 460, y: 70 },
      { id: 'dubhe',   en: 'Dubhe',   zh: '天枢',           mag: 1.8, x: 345, y: 135 },
      { id: 'merak',   en: 'Merak',   zh: '天璇',           mag: 2.3, x: 335, y: 175 },

      { id: 'vega',    en: 'Vega',    zh: '织女一',         mag: 0.03, x: 510, y: 255 },
      { id: 'altair',  en: 'Altair',  zh: '河鼓二 / 牛郎星', mag: 0.8,  x: 650, y: 395 },
      { id: 'deneb',   en: 'Deneb',   zh: '天津四',         mag: 1.25, x: 575, y: 195 },
      { id: 'sadr',    en: 'Sadr',    zh: '天津一',         mag: 2.2,  x: 595, y: 250 },
      { id: 'albireo', en: 'Albireo', zh: '辇道增七',       mag: 3.1,  x: 615, y: 310 },
      { id: 'betelgeuse', en: 'Betelgeuse', zh: '参宿四', mag: 0.42, x: 340, y: 440 },
      { id: 'rigel',      en: 'Rigel',      zh: '参宿七', mag: 0.18, x: 258, y: 520 },
      { id: 'bellatrix',  en: 'Bellatrix',  zh: '参宿五', mag: 1.64, x: 270, y: 430 },
      { id: 'saiph',      en: 'Saiph',      zh: '参宿六', mag: 2.09, x: 355, y: 525 },

    // ==================== 几何工具 ====================
    function convexHull(pts) {
      if (pts.length < 3) return pts.slice();
      const p = pts.slice().sort((a, b) => a.x - b.x || a.y - b.y);
      const cross = (O, A, B) => (A.x - O.x) * (B.y - O.y) - (A.y - O.y) * (B.x - O.x);
      const lower = [];
      for (const q of p) {
        while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], q) <= 0) lower.pop();
        lower.push(q);
      }
      const upper = [];
      for (let i = p.length - 1; i >= 0; i--) {
        const q = p[i];
        while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], q) <= 0) upper.pop();
        upper.push(q);
      }
      lower.pop(); upper.pop();
      return lower.concat(upper);
    }

    function hyperedgePath(stars, padding = 26) {
      if (stars.length === 0) return '';
      if (stars.length === 1) {
        const s = stars[0];
        return `M ${s.x - padding} ${s.y} a ${padding} ${padding} 0 1 0 ${padding*2} 0 a ${padding} ${padding} 0 1 0 ${-padding*2} 0 Z`;
      }
      if (stars.length === 2) {
        const [a, b] = stars;
        const dx = b.x - a.x, dy = b.y - a.y;
        const len = Math.sqrt(dx*dx + dy*dy) || 1;
        const nx = -dy / len * padding, ny = dx / len * padding;
        return `M ${a.x + nx} ${a.y + ny} L ${b.x + nx} ${b.y + ny} A ${padding} ${padding} 0 0 1 ${b.x - nx} ${b.y - ny} L ${a.x - nx} ${a.y - ny} A ${padding} ${padding} 0 0 1 ${a.x + nx} ${a.y + ny} Z`;
      }
      const hull = convexHull(stars);
      const cx = hull.reduce((s, p) => s + p.x, 0) / hull.length;
      const cy = hull.reduce((s, p) => s + p.y, 0) / hull.length;
      const expanded = hull.map(p => {
        const dx = p.x - cx, dy = p.y - cy;
        const len = Math.sqrt(dx*dx + dy*dy) || 1;
        return { x: p.x + dx/len*padding, y: p.y + dy/len*padding };
      });
      let d = `M ${expanded[0].x} ${expanded[0].y}`;
      for (let i = 0; i < expanded.length; i++) {
        const cur = expanded[i];
        const next = expanded[(i + 1) % expanded.length];
        const mx = (cur.x + next.x) / 2;
        const my = (cur.y + next.y) / 2;
        d += ` Q ${cur.x} ${cur.y} ${mx} ${my}`;
      }
      d += ' Z';
      return d;
    }

                    {CHINESE.map(e => (
                      <div key={e.id}
                           className={`edge-item ${lockedEdge?.id===e.id?'locked c':''}`}
                           onMouseEnter={() => setHoveredEdge({...e, kind:'c'})}
                           onMouseLeave={() => setHoveredEdge(null)}
                           onClick={() => setLockedEdge(lockedEdge?.id===e.id ? null : {...e, kind:'c'})}>
                        <span className="name-c">{e.name}</span>
                        <span className="count">·{e.stars.length}</span>
                      </div>
                    ))}
                  </div>
                )}
              </aside>

              {/* 中 */}
              <main style={{ position: 'relative', overflow: 'hidden', minHeight: 600 }}>
                <svg viewBox="0 0 900 650" style={{ width: '100%', height: '100%', display: 'block' }}>
                  <defs>
                    <radialGradient id="sg" cx="50%" cy="50%">
                      <stop offset="0%" stopColor="#ffffff" stopOpacity="1" />
                      <stop offset="40%" stopColor="#fff8e0" stopOpacity="0.9" />
                      <stop offset="100%" stopColor="#fff8e0" stopOpacity="0" />
                    </radialGradient>
                  </defs>

                  {/* 银河 */}
                  <ellipse cx="520" cy="360" rx="420" ry="55" fill="white" opacity="0.025" transform="rotate(-28 520 360)" />
                  <ellipse cx="520" cy="360" rx="340" ry="30" fill="white" opacity="0.035" transform="rotate(-28 520 360)" />

                  {/* 超边 */}
                  <g>
                    {visibleEdges.map(e => {
                      const eStars = e.stars.map(sid => starById[sid]).filter(Boolean);
                      const path = hyperedgePath(eStars);
                      const isActive = activeEdge?.id === e.id;
                      const isDim = activeEdge && !isActive;
                      const isHL = activeStar && e.stars.includes(activeStar.id);
                      const color = e.kind === 'w' ? '#6BD4FF' : '#FFB347';
                      const fillOp = isActive ? 0.22 : isHL ? 0.18 : isDim ? 0.03 : 0.08;
                      const strokeOp = isActive ? 0.85 : isHL ? 0.7 : isDim ? 0.1 : 0.35;
                      return (
                        <path key={e.id} d={path} fill={color} fillOpacity={fillOp}
                              stroke={color} strokeOpacity={strokeOp}
                              strokeWidth={isActive ? 1.8 : 1}
                              className="edge-path"
                              onMouseEnter={() => setHoveredEdge(e)}
                              onMouseLeave={() => setHoveredEdge(null)}
                              onClick={() => setLockedEdge(lockedEdge?.id===e.id ? null : e)} />
                      );
                    })}
                  </g>

                  {/* 标签 */}
                  <g style={{ pointerEvents: 'none' }}>
                    {visibleEdges.map(e => {
                      const eStars = e.stars.map(sid => starById[sid]).filter(Boolean);
                      if (eStars.length === 0) return null;
                      const cx = eStars.reduce((s, p) => s + p.x, 0) / eStars.length;
                      const cy = eStars.reduce((s, p) => s + p.y, 0) / eStars.length;
                      const isActive = activeEdge?.id === e.id;
                      const isHL = activeStar && e.stars.includes(activeStar.id);
                      const visible = isActive || isHL || !activeEdge;
                      if (!visible && !isActive) return null;
                      const color = e.kind === 'w' ? '#BFE8FF' : '#ffe2a8';
                      return (
                        <text key={e.id+'-l'} x={cx} y={cy - 2} textAnchor="middle" fill={color}
                              fontSize={isActive ? 14 : 11}
                              fontFamily={e.kind==='c' ? "'Noto Serif SC', serif" : "'Cormorant Garamond', serif"}
                              fontStyle={e.kind==='w' ? 'italic' : 'normal'}
                              opacity={isActive ? 0.95 : isHL ? 0.75 : 0.32}
                              style={{ letterSpacing: '1px', transition: 'all 0.3s' }}>
                          {e.name}
                        </text>
                      );
                    })}
                  </g>

                  {/* 星 */}
                  <g>
                    {STARS.map(s => {
                      const r = magToRadius(s.mag);
                      const isActive = activeStar?.id === s.id;
                      const inAE = isStarInActiveEdge(s.id);
                      const both = starBelongsToBoth(s.id);
                      const dim = activeEdge && !inAE;
                      return (
                        <g key={s.id}
                           onMouseEnter={() => setHoveredStar(s)}
                           onMouseLeave={() => setHoveredStar(null)}
                           onClick={() => setLockedStar(lockedStar?.id===s.id ? null : s)}
                           style={{ cursor: 'pointer' }}>
                          <circle cx={s.x} cy={s.y} r={r * 3.5} fill="url(#sg)"
                                  opacity={isActive ? 0.95 : dim ? 0.15 : 0.55}
                                  style={{ transition: 'opacity 0.3s' }} />
                          <circle className="star-pt" cx={s.x} cy={s.y} r={r}
                                  fill={isActive ? '#fff' : '#fef3c7'}
                                  opacity={dim ? 0.3 : 1}
                                  style={{ animationDelay: `${(s.x + s.y) % 3}s` }} />
                          {both && mode === 'both' && !dim && (
                            <circle cx={s.x} cy={s.y} r={r * 2.4} fill="none"
                                    stroke="#e8e3d3" strokeWidth="0.5"
                                    opacity={isActive ? 0.85 : 0.32}
                                    strokeDasharray="1 2" />
                          )}
                          {isActive && (
                            <g style={{ pointerEvents: 'none' }}>
                              <text x={s.x + 12} y={s.y - 8} fill="#fff" fontSize="12"
                                    fontFamily="'JetBrains Mono', monospace" fontWeight="500">
                                {s.en}
                              </text>
                              <text x={s.x + 12} y={s.y + 6} fill="#fde68a" fontSize="12"
                                    fontFamily="'Noto Serif SC', serif">
                                {s.zh}
                              </text>
                            </g>
                          )}
                          <circle cx={s.x} cy={s.y} r={Math.max(r * 3, 12)} fill="transparent" />
                        </g>
                      );
                    })}
                  </g>
                </svg>
              </main>

              {/* 右 */}
              <aside className="panel-side right scroll-panel">
                {!activeStar && !activeEdge && (
                  <div className="detail-empty">
                    <p>当你悬停一颗<strong>恒星</strong>，所有包含它的超边都会同时点亮——这就是超图的「<span className="gold">多重身份</span>」。</p>
                    <p>点击<strong>超边</strong>则可读到它背后的神话。</p>
                    <div className="detail-tip">
                      Try this:<br/>
                      → 悬停 <span className="gold">Altair · 牛郎星</span><br/>
                      → 点击 <span className="blue">Orion</span> 与 <span className="gold">参宿</span> 对比<br/>
                      → 切换「叠加」模式
                    </div>
                  </div>
                )}

                {activeStar && (
                  <div className="detail-block">
                    <div className="detail-tag">Star Node · 恒星节点</div>
                    <div className="detail-name">{activeStar.en}</div>
                    <div className="detail-name-cn">{activeStar.zh}</div>
                    <div className="detail-meta">视星等 · mag {activeStar.mag.toFixed(2)}</div>
                    {(() => {
                      const { w, c } = edgesOfStar(activeStar.id);
                      return (
                        <div style={{ marginTop: 22 }}>
                          <div className="detail-tag" style={{ marginBottom: 10 }}>
                            所属超边 · {w.length + c.length} hyperedges
                          </div>
                          {w.map(e => (
                            <div key={e.id} className="edge-card w">
                              <div className="edge-card-name">{e.name} <span style={{ color: '#5b6680', fontSize: 13 }}>· {e.zh}</span></div>
                              <div className="edge-card-myth">{e.myth}</div>
                            </div>
                          ))}
                          {c.map(e => (
                            <div key={e.id} className="edge-card c">
                              <div className="edge-card-name">{e.name}</div>
                              <div className="edge-card-myth">{e.myth}</div>
                            </div>
                          ))}
                          {w.length > 0 && c.length > 0 && (
                            <div className="dual-note">
                              ✦ 这颗星同时归属于两种文明的超边，是超图中被多边共享的节点。
                            </div>
                          )}
                        </div>
                      );
                    })()}
                  </div>
                )}

                {!activeStar && activeEdge && (
                  <div className="detail-block">
                    <div className="detail-tag" style={{ color: activeEdge.kind==='w'?'#6BD4FF':'#FFB347' }}>
                      {activeEdge.kind==='w' ? 'Western Hyperedge · 西方超边' : '中国星官超边 · Asterism'}
                    </div>
                    <div className="detail-name" style={{
                      color: activeEdge.kind==='w'?'#BFE8FF':'#ffe2a8',
                      fontStyle: activeEdge.kind==='w'?'italic':'normal',
                      fontFamily: activeEdge.kind==='w'?"'Cormorant Garamond', serif":"'Noto Serif SC', serif"
                    }}>
                      {activeEdge.name}
                    </div>
                    {activeEdge.kind==='w' && (
                      <div className="detail-name-cn" style={{ color: '#e8e3d3' }}>{activeEdge.zh}</div>
                    )}
                    <div className="detail-meta">|E| = {activeEdge.stars.length} stars</div>
                    <div style={{
                      marginTop: 18, color: '#c5bfa9', fontSize: 14, lineHeight: 1.95,
                      fontFamily: "'Noto Serif SC', serif", fontWeight: 300
                    }}>
                      {activeEdge.myth}
                    </div>
                    <div className="detail-tag" style={{ marginTop: 22, marginBottom: 8 }}>
                      Stars · 包含恒星
                    </div>
                    {activeEdge.stars.map(sid => {
                      const s = starById[sid]; if (!s) return null;
                      return (
                        <div key={sid} style={{
                          padding: '4px 0', fontSize: 13,
                          display: 'flex', justifyContent: 'space-between',
                          borderBottom: '1px solid rgba(255,255,255,0.04)'
                        }}>
                          <span>
                            <span style={{ color: '#e8e3d3', fontStyle: 'italic',
                                          fontFamily: "'Cormorant Garamond', serif" }}>{s.en}</span>
                            <span style={{ color: '#8b7f5f', marginLeft: 8,
                                          fontFamily: "'Noto Serif SC', serif" }}>{s.zh}</span>
                          </span>
                          <span style={{ color: '#4a4533',
                                        fontFamily: "'JetBrains Mono', monospace", fontSize: 11 }}>
                            {s.mag.toFixed(1)}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </aside>
            </div>
          </div>
        </section>
      );
    }

    // ==================== Discovery Cards ====================
    function Discoveries() {
      const cards = [
        {
          num: 'I.',
          title: 'Orion ⇌ 参宿',
          titleCn: '同样七星，两种命运',
          glow: 'rgba(107, 212, 255, 0.10)',
          body: '猎户座的七颗主星，与中国「参宿」几乎完全重合——但西方人看到的是被毒蝎蜇死的猎人俄里翁，中国人看到的是西方白虎之首。',
          quote: '「人生不相见，动如参与商」——杜甫，《赠卫八处士》'
        },
        {
          num: 'II.',
          title: 'Summer Triangle ⇌ 牛郎织女',
          titleCn: '横跨三星座的爱情',
          glow: 'rgba(255, 179, 71, 0.10)',
          body: '夏季大三角连接 Vega、Altair、Deneb——在西方天文中横跨三个星座，被称为 asterism（非正式星组）。在中国，这恰是织女、牛郎、与「天津」鹊桥的故事舞台。',
          quote: '「盈盈一水间，脉脉不得语」——《古诗十九首》'
        },
        {
          num: 'III.',
          title: 'Big Dipper ⇌ 北斗',
          titleCn: '人类共同的指南针',
          glow: 'rgba(232, 227, 211, 0.08)',
          body: '北斗七星——西方将其纳入大熊座作为身体；中国则赋予其独立尊位「帝车」，成为定方位、辨四时、占吉凶的核心。同一组星，两种完全不同的文化重要性。',
          quote: '「斗柄东指，天下皆春」——《鹖冠子》'
        },
      ];
      return (
        <section className="discoveries">
          <div className="section-tag">Featured Discoveries · 三处惊鸿</div>
          <h2 className="section-title">When Two Skies Collide.</h2>
          <div className="section-title-cn">超 边 之 交</div>
          <p style={{
            fontSize: 15, lineHeight: 1.95, color: '#b8b29c', maxWidth: 720,
            fontFamily: "'Noto Serif SC', serif", fontWeight: 300
          }}>
            超图最迷人的瞬间，是两套超边系统在同一组节点上相遇的时刻——
            两个文明对夜空的「分类」竟如此相似，又如此不同。
          </p>

          <div className="disc-grid">
            {cards.map((c, i) => (
              <div key={i} className="disc-card" style={{ '--glow': c.glow }}>
                <div className="disc-num">{c.num}</div>
                <div className="disc-title">{c.title}</div>
                <div className="disc-title-cn">{c.titleCn}</div>
                <div className="disc-body">{c.body}</div>
                <div className="disc-quote">{c.quote}</div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    // ==================== Footer ====================
    function Footer() {
      return (
        <footer className="footer">
          <div className="footer-line">
            ✦ &nbsp; 凡所有星，皆有故事 &nbsp; ✦
          </div>
          <div className="footer-meta">
            CELESTIAL HYPERGRAPH &nbsp;·&nbsp; A Mid-Term Project<br/>
            Data Visualization Course &nbsp;·&nbsp; Tsinghua SIGS Spring 2026<br/>
            Background Imagery — Unsplash / Photo by Greg Rakozy
          </div>
        </footer>
      );
    }

    // ==================== Root ====================
    function App() {
      return (
        <>
          <Hero />
          <InsightSection />
          <StarMap />
          <Discoveries />
          <Footer />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
